# Netlify deployment configuration
# This project uses TanStack Start (SSR-capable) but builds a client bundle
# under dist/ that can be served as a SPA. The SPA fallback below ensures
# client-side routes resolve correctly on refresh / deep links.

[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback so client-side routes work on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
